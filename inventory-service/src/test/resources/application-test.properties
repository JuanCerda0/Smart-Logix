spring.datasource.url=jdbc:h2:mem:smartlogix_inventory_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.h2.console.enabled=false

security.jwt.secret=${SMARTLOGIX_JWT_SECRET:smartlogix-development-secret-key-change-me-2026}
