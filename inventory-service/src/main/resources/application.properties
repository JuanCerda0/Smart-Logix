spring.application.name=inventory-service
server.port=8081

spring.datasource.url=${SMARTLOGIX_DB_URL:jdbc:postgresql://localhost:5432/smartlogix_inventory}
spring.datasource.username=${SMARTLOGIX_DB_USERNAME:smartlogix}
spring.datasource.password=${SMARTLOGIX_DB_PASSWORD:smartlogix123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

management.endpoints.web.exposure.include=health,info

security.jwt.secret=${SMARTLOGIX_JWT_SECRET:smartlogix-development-secret-key-change-me-2026}
